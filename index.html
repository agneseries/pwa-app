<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#6B5B95" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/Logo1.png" type="image/png" />
  <title>NandurKarya - Portofolio Pengrajin Kustom</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    :root {
      --bg-offwhite: #F8F9FA;
      --card-white: #FFFFFF;
      --soft-lavender: #E6E6FA;
      --lavender-hover: #D8D8F0;
      --primary-purple: #6B5B95;
      --primary-dark: #5A4A7A;
      --text-dark: #2C2C2C;
      --text-gray: #6C6C6C;
      --border-light: #E5E5E5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-offwhite);
      color: var(--text-dark);
      line-height: 1.6;
    }

    /* Header Styles */
    .header {
      background: linear-gradient(135deg, var(--primary-purple) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 3rem 0 2.5rem;
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 300px;
      height: 300px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -5%;
      width: 200px;
      height: 200px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
    }

    .header-content {
      position: relative;
      z-index: 1;
    }

    .brand h1 {
      font-size: 2.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
    }

    .brand p {
      font-size: 1rem;
      font-weight: 300;
      opacity: 0.9;
      margin-bottom: 0;
    }

    /* Search Section */
    .search-section {
      margin-bottom: 2.5rem;
    }

    .search-wrapper {
      position: relative;
      max-width: 500px;
      margin: 0 auto;
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-gray);
      font-size: 1rem;
    }

    .search-input {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 2.8rem;
      border: 2px solid var(--border-light);
      border-radius: 50px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      background: var(--card-white);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary-purple);
      box-shadow: 0 0 0 3px rgba(107, 91, 149, 0.1);
    }

    /* Card Styles */
    .portfolio-card {
      background: var(--card-white);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .portfolio-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
    }

    .card-image-wrapper {
      position: relative;
      padding-top: 75%;
      overflow: hidden;
      background: #f0f0f0;
    }

    .card-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .portfolio-card:hover .card-image {
      transform: scale(1.05);
    }

    .card-category {
      position: absolute;
      top: 1rem;
      right: 1rem;
      color: var(--primary-dark);
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      backdrop-filter: blur(4px);
      background: rgba(230, 230, 250, 0.95);
    }

    .card-content {
      padding: 1.25rem;
      flex: 1;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-dark);
    }

    .card-description {
      font-size: 0.85rem;
      color: var(--text-gray);
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .card-footer-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border-light);
      font-size: 0.75rem;
      color: var(--text-gray);
    }

    .card-service-type {
      background: var(--bg-offwhite);
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 500;
    }

    /* Modal Styles */
    .modal-content {
      border-radius: 20px;
      border: none;
    }

    .modal-header {
      border-bottom: 1px solid var(--border-light);
      padding: 1.25rem 1.5rem;
    }

    .modal-title {
      font-weight: 600;
      color: var(--text-dark);
    }

    .modal-body {
      padding: 1.5rem;
    }

    .modal-project-image {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 1.25rem;
    }

    .modal-project-description {
      color: var(--text-gray);
      margin-bottom: 1rem;
      line-height: 1.7;
    }

    .modal-project-meta {
      background: var(--bg-offwhite);
      padding: 1rem;
      border-radius: 12px;
      margin-top: 1rem;
    }

    .modal-project-meta p {
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .modal-project-meta strong {
      color: var(--text-dark);
    }

    .modal-footer {
      border-top: 1px solid var(--border-light);
      padding: 1rem 1.5rem;
    }

    .btn-primary {
      background: var(--primary-purple);
      border: none;
      padding: 0.6rem 1.25rem;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      border-radius: 50px;
      transition: all 0.2s ease;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: var(--bg-offwhite);
      border: 1px solid var(--border-light);
      color: var(--text-dark);
      padding: 0.6rem 1.25rem;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      border-radius: 50px;
    }

    .btn-secondary:hover {
      background: var(--border-light);
      color: var(--text-dark);
    }

    /* Footer */
    .footer {
      background: var(--primary-dark);
      color: white;
      text-align: center;
      padding: 1.5rem 0;
      margin-top: 3rem;
    }

    .footer p {
      margin-bottom: 0;
      font-size: 0.85rem;
      opacity: 0.8;
    }

    /* Responsive Grid */
    @media (max-width: 768px) {
      .header {
        padding: 2rem 0 1.5rem;
      }
      
      .brand h1 {
        font-size: 1.75rem;
      }
      
      .brand p {
        font-size: 0.85rem;
      }
      
      .card-title {
        font-size: 1rem;
      }
      
      .gallery-section .row {
        margin: 0;
      }
    }

    @media (min-width: 768px) and (max-width: 992px) {
      .portfolio-card {
        font-size: 0.9rem;
      }
    }

    /* Animation for cards */
    .portfolio-card {
      animation: fadeInUp 0.4s ease backwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* No results state */
    .no-results {
      text-align: center;
      padding: 3rem;
      color: var(--text-gray);
      background: var(--card-white);
      border-radius: 16px;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-offwhite);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--primary-purple);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary-dark);
    }
  </style>
</head>

<body>
  <header class="header">
    <div class="container">
      <div class="header-content">
        <div class="brand">
          <h1>NandurKarya</h1>
          <p>Portofolio Digital Pengrajin Kustom</p>
        </div>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <!-- Search Section -->
      <section class="search-section">
        <div class="search-wrapper">
          <i class="fas fa-search search-icon"></i>
          <input type="text" id="searchInput" class="search-input" placeholder="Cari proyek atau jasa...">
        </div>
      </section>

      <!-- Gallery Container -->
      <section class="gallery-section">
        <div class="row g-4" id="portfolioGallery"></div>
      </section>
    </div>
  </main>

  <!-- Modal Detail -->
  <div class="modal fade" id="projectModal" tabindex="-1" aria-labelledby="projectModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="projectModalLabel">Detail Proyek</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="modalBody">
          <!-- Dynamic content -->
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
          <button type="button" class="btn btn-primary" id="modalWhatsAppBtn">Hubungi via WhatsApp</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>2025 NandurKarya. Membangun Karya Pengrajin Indonesia.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    // Portfolio Data - 6 contoh proyek pengrajin kustom
    const portfolioData = [
      {
        id: 1,
        title: "Kanopi Minimalis Modern",
        category: "Bengkel Las",
        serviceType: "Arsitektur dan Konstruksi",
        shortDesc: "Kanopi besi dengan desain minimalis modern, menggunakan material hollow hitam doff dan atap polycarbonate solid.",
        fullDesc: "Proyek kanopi minimalis modern ini dikerjakan untuk klien perumahan di daerah Sleman. Dengan lebar 4 meter dan panjang 6 meter, kanopi ini didesain untuk menampung 2 mobil sekaligus. Material utama menggunakan besi hollow 4x4 dengan ketebalan 1.6mm, dicat dengan powder coating warna hitam doff untuk kesan elegan. Atap menggunakan polycarbonate solid 3mm yang tahan panas dan tidak mudah pecah. Pengerjaan memakan waktu 7 hari kerja, termasuk proses pengelasan, perakitan, dan finishing. Hasil akhir sangat memuaskan klien karena kokoh dan estetis.",
        image: "https://images.unsplash.com/photo-1503387762-592deb58ef4e?w=600&h=450&fit=crop",
        date: "Desember 2024",
        location: "Sleman, Yogyakarta"
      },
      {
        id: 2,
        title: "Kebaya Encim Brokat",
        category: "Penjahit",
        serviceType: "Fashion dan Busana",
        shortDesc: "Kebaya encim modern dengan bahan brokat premium, dipadukan dengan kain batik tulis.",
        fullDesc: "Kebaya encim ini dipesan untuk acara pernikahan adat Betawi. Menggunakan bahan brokat premium dengan motif bunga yang lembut, dipadukan dengan kain batik tulis khas Solo. Proses pembuatan memakan waktu 2 minggu dengan detail sulam tangan pada bagian kerah dan ujung lengan. Hasil akhir sangat memuaskan dengan fitting sempurna dan kenyamanan maksimal saat dikenakan.",
        image: "https://images.unsplash.com/photo-1612198188061-c98c29a7a9fd?w=600&h=450&fit=crop",
        date: "November 2024",
        location: "Bantul, Yogyakarta"
      },
      {
        id: 3,
        title: "Meja Makan Solid Jati",
        category: "Pengrajin Kayu",
        serviceType: "Furniture Kustom",
        shortDesc: "Meja makan dari kayu jati solid ukuran 160x90cm dengan finishing natural yang menonjolkan serat kayu asli.",
        fullDesc: "Meja makan jati solid ini dibuat dari kayu jati grade A dengan umur pohon di atas 30 tahun. Proses pembuatan dilakukan secara manual dengan teknik sambungan kayu tradisional tanpa paku. Finishing menggunakan polyurethane clear coat yang aman untuk makanan. Meja ini memiliki ketahanan terhadap rayap dan perubahan cuaca. Dikombinasikan dengan 6 kursi jati dengan desain yang matching.",
        image: "https://images.unsplash.com/photo-1530018604532-134f2ac969a8?w=600&h=450&fit=crop",
        date: "Oktober 2024",
        location: "Jepara, Jawa Tengah"
      },
      {
        id: 4,
        title: "Tas Selempang Kulit Vintage",
        category: "Pengrajin Kulit",
        serviceType: "Kerajinan Kulit",
        shortDesc: "Tas selempang pria dari kulit sapi full grain dengan pewarnaan natural dan jahitan tangan detail.",
        fullDesc: "Tas selempang ini dibuat menggunakan kulit sapi full grain pilihan yang diproses secara vegetable tanning. Setiap tas melalui proses pengecatan tangan dengan pewarna natural sehingga menghasilkan warna yang unik dan tidak sama persis antar produk. Terdapat 3 kompartemen utama dan 2 saku kecil untuk kartu dan handphone. Jahitan menggunakan benang lilin yang kuat dengan teknik saddle stitch yang terkenal tahan lama.",
        image: "https://images.unsplash.com/photo-1594223274512-ad4803739b7c?w=600&h=450&fit=crop",
        date: "September 2024",
        location: "Garut, Jawa Barat"
      },
      {
        id: 5,
        title: "Pagar Besi Tempa Minimalis",
        category: "Bengkel Las",
        serviceType: "Arsitektur dan Konstruksi",
        shortDesc: "Pagar besi tempa dengan desain minimalis modern, dilengkapi ornamen geometris dan finishing anti karat.",
        fullDesc: "Proyek pagar besi tempa untuk rumah minimalis 2 lantai ini memiliki panjang 12 meter dengan tinggi 1.5 meter. Desain menggabungkan garis vertikal bersih dengan ornamen geometris yang artistik. Setiap sambungan dilas dengan presisi dan dihaluskan sebelum proses pengecatan. Finishing menggunakan powder coating warna hitam matte dengan 3 lapis untuk ketahanan maksimal terhadap cuaca. Pagar ini juga dilengkapi dengan sistem penguncian otomatis pada pintu pagar.",
        image: "https://images.unsplash.com/photo-1577999528440-b7a6ef2cbfd9?w=600&h=450&fit=crop",
        date: "Agustus 2024",
        location: "Surabaya, Jawa Timur"
      },
      {
        id: 6,
        title: "Lemari Pakaian Kustom",
        category: "Pengrajin Kayu",
        serviceType: "Furniture Kustom",
        shortDesc: "Lemari pakaian built-in dengan sistem sliding door dan pencahayaan LED otomatis.",
        fullDesc: "Lemari pakaian kustom ini didesain sesuai dengan ukuran ruangan klien (lebar 3m x tinggi 2.5m). Memiliki 4 pintu sliding dengan kombinasi warna putih dan kayu natural. Bagian dalam dilengkapi dengan rak adjustable, laci tersembunyi, dan gantungan baju double layer. Sistem pencahayaan LED menyala otomatis saat pintu dibuka. Proses pengerjaan meliputi pengukuran presisi, fabrikasi, dan instalasi di lokasi selama 3 hari.",
        image: "https://images.unsplash.com/photo-1595428774223-ef52624120d2?w=600&h=450&fit=crop",
        date: "Juli 2024",
        location: "Bandung, Jawa Barat"
      }
    ];

    // DOM Elements
    let currentProject = null;
    let currentModal = null;

    // Function to render portfolio cards using .map()
    function renderPortfolio(filterText = '') {
      const gallery = document.getElementById('portfolioGallery');
      if (!gallery) return;
      
      const filteredData = portfolioData.filter(item => {
        const searchTerm = filterText.toLowerCase();
        return item.title.toLowerCase().includes(searchTerm) ||
               item.category.toLowerCase().includes(searchTerm) ||
               item.serviceType.toLowerCase().includes(searchTerm) ||
               item.shortDesc.toLowerCase().includes(searchTerm);
      });
      
      if (filteredData.length === 0) {
        gallery.innerHTML = `
          <div class="col-12">
            <div class="no-results">
                              <i class="fas fa-search" style="font-size: 2rem; margin-bottom: 1rem; display: block; color: #ccc;"></i>
              <p>Tidak ada proyek yang ditemukan untuk pencarian</p>
            </div>
          </div>
        `;
        return;
      }
      
      // Using .map() to generate HTML
      const cardsHTML = filteredData.map((item, index) => {
        return `
          <div class="col-md-6 col-lg-4">
            <div class="portfolio-card" onclick="showProjectDetail(${item.id})">
              <div class="card-image-wrapper">
                <img src="${item.image}" alt="${item.title}" class="card-image" loading="lazy">
                <span class="card-category">${item.category}</span>
              </div>
              <div class="card-content">
                <h3 class="card-title">${item.title}</h3>
                <p class="card-description">${item.shortDesc.substring(0, 80)}...</p>
                <div class="card-footer-info">
                  <span class="card-service-type">${item.serviceType}</span>
                  <span><i class="far fa-calendar-alt" style="margin-right: 4px;"></i> ${item.date}</span>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
      
      gallery.innerHTML = cardsHTML;
    }

    // Function to show project detail in modal
    function showProjectDetail(projectId) {
      const project = portfolioData.find(p => p.id === projectId);
      if (!project) return;
      
      currentProject = project;
      
      const modalBody = document.getElementById('modalBody');
      if (!modalBody) return;
      
      modalBody.innerHTML = `
        <img src="${project.image}" alt="${project.title}" class="modal-project-image">
        <h5 class="mb-3">${project.title}</h5>
        <p class="modal-project-description">${project.fullDesc}</p>
        <div class="modal-project-meta">
          <p><strong>Kategori:</strong> ${project.category}</p>
          <p><strong>Jenis Jasa:</strong> ${project.serviceType}</p>
          <p><strong>Tanggal Selesai:</strong> ${project.date}</p>
          <p><strong>Lokasi:</strong> ${project.location}</p>
        </div>
      `;
      
      // Initialize and show modal
      if (currentModal) {
        currentModal.dispose();
      }
      
      const modalElement = document.getElementById('projectModal');
      currentModal = new bootstrap.Modal(modalElement);
      currentModal.show();
      
      // Update WhatsApp button in modal
      const waBtn = document.getElementById('modalWhatsAppBtn');
      if (waBtn) {
        waBtn.onclick = () => sendWhatsApp(project.title);
      }
    }

    // WhatsApp Integration function
    function sendWhatsApp(projectName) {
      const message = `Halo, saya tertarik dengan hasil pengerjaan "${projectName}" yang saya lihat di NandurKarya. Saya ingin berkonsultasi mengenai jasa serupa.`;
      const encodedMessage = encodeURIComponent(message);
      // Empty phone number - user will select their contact
      const phoneNumber = "";
      const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodedMessage}`;
      window.open(whatsappUrl, '_blank');
    }

    // Search Feature functionality
    function initSearch() {
      const searchInput = document.getElementById('searchInput');
      if (!searchInput) return;
      
      let debounceTimer;
      searchInput.addEventListener('input', (e) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          renderPortfolio(e.target.value);
        }, 300);
      });
    }

    // Initialize everything when DOM is loaded
    document.addEventListener('DOMContentLoaded', () => {
      renderPortfolio();
      initSearch();
      
      // Close modal handler
      const modalElement = document.getElementById('projectModal');
      if (modalElement) {
        modalElement.addEventListener('hidden.bs.modal', () => {
          if (currentModal) {
            currentModal.dispose();
            currentModal = null;
          }
        });
      }
    });

    // Expose functions to global scope for onclick events
    window.showProjectDetail = showProjectDetail;
    window.sendWhatsApp = sendWhatsApp;

    // Service Worker Registration (from original template)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js')
        .then(() => console.log('SW registered!'))
        .catch(err => console.error('SW gagal:', err));
    }
  </script>
</body>

</html>
